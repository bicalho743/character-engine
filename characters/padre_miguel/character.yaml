# Configuração técnica do personagem Padre Miguel
# (a "alma" fica em persona.md — aqui são só parâmetros do pipeline)

name: "Padre Miguel"
slug: "padre_miguel"
language: "pt-BR"

# ── Voz (ElevenLabs) ─────────────────────────────────────────────
# TROQUE pelo voice_id da voz PT-BR que você escolher no ElevenLabs.
# Dica: procure vozes masculinas calmas em português na Voice Library.
voice:
  voice_id: "SUBSTITUA_PELO_VOICE_ID"
  model_id: "eleven_multilingual_v2"
  stability: 0.55
  similarity_boost: 0.75
  style: 0.30

# ── Avatar ───────────────────────────────────────────────────────
# Coloque a imagem base (Midjourney) em characters/padre_miguel/avatar/base.png
# Retrato 3:4 ou 9:16, rosto bem visível, fundo do cenário padrão da persona.
avatar:
  image: "characters/padre_miguel/avatar/base.png"

# ── Vídeo ────────────────────────────────────────────────────────
# lowcost  = Hailuo img2video + VEED Lipsync (~$0.65/vídeo)
# premium  = Kling Avatar v2 (~$2/vídeo)
video:
  mode: "lowcost"
  duration_target: 25          # segundos (20-30)
  broll_style: >
    Cinematic, warm light. Interior of a simple Catholic church, candles,
    stained glass, rosary beads, open Bible, hands in prayer, soft sun rays.
    NO readable text, NO faces of real people.

# ── Publicação (Upload-Post) ─────────────────────────────────────
publish:
  upload_post_user: "padre_miguel"     # profile criado no app.upload-post.com
  platforms: ["instagram", "tiktok", "youtube"]
  default_hashtags:
    - "#fecatolica"
    - "#padremiguel"
    - "#evangelho"
    - "#igrejacatolica"
    - "#oracao"
